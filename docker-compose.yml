x-app-environment: &app-environment
  APP_NAME: "Notification Service"
  APP_ENV: local
  # Фиксированный демо-ключ: стек поднимается без единого ручного шага.
  APP_KEY: base64:gTMARZfGaNCsEJ9QbqNFicEMPIGr4jmiPGlUnd1Sdng=
  APP_DEBUG: "true"
  APP_URL: http://localhost:8080
  APP_LOCALE: ru
  APP_FALLBACK_LOCALE: en
  LOG_CHANNEL: stderr
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: notifications
  DB_USERNAME: notifications
  DB_PASSWORD: secret
  CACHE_STORE: redis
  SESSION_DRIVER: file
  QUEUE_CONNECTION: rabbitmq
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  RABBITMQ_VHOST: /
  NOTIFICATIONS_QUEUE_HIGH: notifications_high
  NOTIFICATIONS_QUEUE_LOW: notifications_low
  PROVIDER_RATE_LIMIT_PER_SECOND: 50
  DELIVERY_CALLBACK_DELAY_SECONDS: 2

x-app-service: &app-service
  build: .
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  app:
    <<: *app-service
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: "1"

  worker-high:
    <<: *app-service
    # Выделенный консьюмер: транзакционный трафик никогда не ждёт маркетинговый.
    # Масштабируется горизонтально при всплеске критичного трафика:
    #   docker compose up -d --scale worker-high=N
    command: php artisan queue:work rabbitmq --queue=notifications_high --sleep=1 --max-time=3600
    environment: *app-environment
    deploy:
      resources:
        # Критичному трафику резервируем ресурсы, чтобы маркетинг их не отнял.
        reservations:
          cpus: "1.0"
          memory: 256M
        limits:
          cpus: "2.0"
          memory: 512M
    depends_on:
      app:
        condition: service_started

  worker-low:
    <<: *app-service
    command: php artisan queue:work rabbitmq --queue=notifications_low --sleep=1 --max-time=3600
    environment: *app-environment
    deploy:
      resources:
        # Маркетинг ограничен сверху — не может задавить хост и забрать CPU у high.
        limits:
          cpus: "1.0"
          memory: 384M
    depends_on:
      app:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications -d notifications"]
      interval: 3s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    ports:
      # Management UI: http://localhost:15672 (guest/guest)
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
